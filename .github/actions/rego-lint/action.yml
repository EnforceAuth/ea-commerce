name: Rego Lint (Regal)
description: Lint changed Rego files using Regal

inputs:
  regal-version:
    description: Regal version to install
    required: false
    default: v0.39.0

runs:
  using: composite
  steps:
    - uses: open-policy-agent/setup-regal@v1
      with:
        version: ${{ inputs.regal-version }}

    - name: Get changed Rego files
      id: changed
      shell: bash
      run: |
        FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.rego')
        if [ -z "$FILES" ]; then
          echo "has_files=false" >> "$GITHUB_OUTPUT"
        else
          DIRS=$(echo "$FILES" | xargs -I{} dirname {} | sort -u | tr '\n' ' ')
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
        fi

    - name: Lint changed Rego files
      if: steps.changed.outputs.has_files == 'true'
      shell: bash
      run: regal lint ${{ steps.changed.outputs.dirs }}
