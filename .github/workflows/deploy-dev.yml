# Deploys dev policies to EnforceAuth when dev/ changes on main.
# Entity ID configured in EA_ENTITY_ID secret (dev environment).
name: "Deploy: dev"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dev/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint dev policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/rego-lint

  test:
    name: Test dev policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: "1.15"
      - run: opa test dev/ -v

  deploy:
    name: Deploy via EnforceAuth
    needs: [lint, test]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Policy Bundle
        uses: EnforceAuth/deploy-action@v1
        with:
          entity-id: ${{ secrets.EA_ENTITY_ID }}
          api-url: ${{ vars.EA_API_URL }}
          environment: dev
          wait-for-completion: true
          timeout-minutes: 10
